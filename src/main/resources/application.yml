server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: false
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  sql:
    init:
      mode: always
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:fallback-secret-only-for-local-dev-replace-in-prod}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000},http://localhost:5173

ml:
  client-id: ${ML_CLIENT_ID:}
  client-secret: ${ML_CLIENT_SECRET:}
  redirect-uri: ${ML_REDIRECT_URI:}

mp:
  access-token: ${MP_ACCESS_TOKEN:}

logging:
  level:
    com.gilede: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
